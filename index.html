---
layout: default
---

<div class="posts">
  {% assign sorted_posts = site.posts | sort: "title" %}
  <ul>
    {% for post in sorted_posts %}
      <li>
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
        <span> ({{ post.last_modified_at | default: post.date | date: "%Y-%m-%d" }})</span>
      </li>
    {% endfor %}
  </ul>
</div>
